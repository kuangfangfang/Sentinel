server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    location ~* (^|/)\.(?!well-known(?:/|$))[^/]+ {
        return 404;
    }

    location ~* /(phpinfo|php-info|info|test|debug|adminer|laravel\.log)(\.php|\.txt|/|$) {
        return 404;
    }

    location ~* /composer\.(json|lock)$ {
        return 404;
    }

    location ~* /(wp-|wordpress|xmlrpc\.php|cgi-bin|vendor|storage|backup|boaform|actuator|server-status|phpunit)(/|$|[^/]*$) {
        return 404;
    }

    location ~* \.(sql|bak|backup|old|zip|tar|gz|7z|rar)$ {
        return 404;
    }

    location /api/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
