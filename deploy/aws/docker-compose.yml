# Run on an AWS EC2 instance (free-tier t3.micro) with a persistent EBS volume mounted at ./data.
# Copy deploy/aws/.env.example to deploy/aws/.env and fill in secrets before starting.
#
#   cd deploy/aws
#   docker compose up -d --build

services:
  api:
    build:
      context: ../..
      dockerfile: deploy/aws/Dockerfile.api
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Sqlite: Data Source=/data/sentinel.db
      FileStorage__Root: /data/uploaded-evidence
      Jwt__SigningKey: ${JWT_SIGNING_KEY}
      Cors__AllowedOrigins__0: ${FRONTEND_ORIGIN}
      Seed__BootstrapCaseworkerEmail: ${SEED_BOOTSTRAP_CASEWORKER_EMAIL}
      Seed__BootstrapCaseworkerPassword: ${SEED_BOOTSTRAP_CASEWORKER_PASSWORD}
      Seed__BootstrapCaseworkerFullName: ${SEED_BOOTSTRAP_CASEWORKER_FULL_NAME:-Sentinel Admin}
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  web:
    build:
      context: ../..
      dockerfile: deploy/aws/Dockerfile.web
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_SITE_URL: ${VITE_SITE_URL}
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
