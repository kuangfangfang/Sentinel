# Manual deploy to EC2 — run from GitHub Actions → Deploy EC2 → Run workflow.
# Requires GitHub repository secrets — see deploy/aws/README.md § Manual deploy.

name: Deploy EC2

on:
  workflow_dispatch:

concurrency:
  group: deploy-ec2
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_SSH_PORT || 22 }}
          command_timeout: 30m
          envs: GITHUB_PAT
          script_stop: true
          script: |
            bash ~/sentinel/deploy/aws/deploy.sh
        env:
          GITHUB_PAT: ${{ secrets.EC2_GIT_PAT }}
