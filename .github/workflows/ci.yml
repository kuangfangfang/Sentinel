name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Test
        run: dotnet test -c Release

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sentinel-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: sentinel-web/package-lock.json
      - run: npm ci
      - run: npm run test:validation
      - run: npm run build
        env:
          VITE_API_BASE_URL: http://localhost:5187/api
